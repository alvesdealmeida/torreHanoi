<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Torre de Hanói — Mobile Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f1623; --card: #1e2d42; --accent: #4f90f8; --gold: #f5c842;
    --red: #ef4444; --green: #22c55e; --text: #e8f0fe;
  }

  body {
    font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
    margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center;
    height: 100vh;
  }

  /* BLOQUEIO PARA DESKTOP */
  #pc-warning {
    display: none; position: fixed; inset: 0; background: #000; z-index: 9999;
    flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px;
  }
  @media (min-width: 1025px) { #pc-warning { display: flex; } main, header { display: none; } }

  header { padding: 1rem; text-align: center; width: 100%; }
  main { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; padding: 10px; flex: 1; }
  
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-box { background: var(--card); padding: 8px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
  .stat-val { display: block; font-size: 1.2rem; font-weight: 800; font-family: 'Baloo 2'; }

  .game-area { 
    background: var(--card); height: 320px; border-radius: 20px; position: relative; 
    border-bottom: 6px solid #2d3e55; margin-top: 10px; display: flex;
  }

  /* COLUNAS (ÁREA DE CLIQUE) */
  .peg-container {
    flex: 1; position: relative; height: 100%; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    z-index: 2;
  }
  .peg-shaft { 
    width: 10px; height: 200px; background: #4a6380; border-radius: 5px; 
    position: absolute; bottom: 20px; z-index: 1;
  }
  .peg-container.active .peg-shaft { background: var(--accent); }

  /* DISCOS */
  .disc {
    height: 28px; border-radius: 6px; display: flex; align-items: center; 
    justify-content: center; color: white; font-weight: 900; font-size: 0.9rem;
    position: absolute; transition: all 0.2s ease; z-index: 3;
    pointer-events: none; /* O clique passa para o peg-container */
  }
  .disc.moving { transform: translateY(-30px); filter: brightness(1.2); box-shadow: 0 0 15px var(--accent); }

  /* MODAL */
  #win-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
    z-index: 1000; align-items: center; justify-content: center;
  }
  .win-content { background: var(--card); padding: 30px; border-radius: 24px; text-align: center; width: 80%; }

  .footer-dev {
    text-align: center;
    padding: 15px;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.5);
    font-family: 'Nunito', sans-serif;
  }
</style>
</head>
<body>

<div id="pc-warning">
  <h1>📱</h1>
  <h2>Use um Celular ou Tablet</h2>
  <p>Esta versão foi feita para dispositivos móveis.</p>
</div>

<header>
  <h2 style="font-family:'Baloo 2'; margin:0;">Torre de Hanói <span style="color:var(--gold)">MOBILE</span></h2>
</header>

<main>
  <div style="display:flex; gap:10px; justify-content:center;">
    <select id="disc-qty" onchange="resetGame()" style="padding:10px; border-radius:8px;">
      <option value="3">3 Discos</option>
      <option value="4">4 Discos</option>
      <option value="5">5 Discos</option>
    </select>
    <button onclick="resetGame()" style="padding:10px 15px; border-radius:8px; font-weight:bold;">Reset</button>
  </div>

  <div class="stats-grid">
    <div class="stat-box"><span class="stat-val" id="moves-count">0</span><small>PASSOS</small></div>
    <div class="stat-box"><span class="stat-val" id="min-needed" style="color:var(--gold)">7</span><small>MÍNIMO</small></div>
    <div class="stat-box"><span class="stat-val" id="level-display" style="color:var(--accent)">1</span><small>NÍVEL</small></div>
  </div>

  <div class="game-area" id="canvas">
    <div class="peg-container" onclick="handlePegClick(0)" id="peg-0"><div class="peg-shaft"></div></div>
    <div class="peg-container" onclick="handlePegClick(1)" id="peg-1"><div class="peg-shaft"></div></div>
    <div class="peg-container" onclick="handlePegClick(2)" id="peg-2"><div class="peg-shaft"></div></div>
  </div>
</main>
<!-- Desenvolvido por  -->
<div class="footer-dev">
  Desenvolvido por Sebastião Alves de Almeida
</div>
  
<div id="win-modal">
  <div class="win-content">
    <h1 style="color:var(--gold)">VITÓRIA! 🏆</h1>
    <p id="win-stats"></p>
    <button onclick="nextLevel()" style="padding:15px; width:100%; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">PRÓXIMO NÍVEL</button>
  </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(f, t, d, v=0.1) {
  const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
  o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

const sounds = {
  pick: () => playSound(500, 'sine', 0.2),
  drop: () => playSound(400, 'sine', 0.2),
  error: () => playSound(150, 'sawtooth', 0.3, 0.2),
  stepWarn: () => { playSound(100, 'square', 0.1); setTimeout(()=>playSound(100, 'square', 0.1), 100); },
  win: () => [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playSound(f, 'triangle', 0.5), i * 150))
};

let pegs = [[], [], []];
let selectedPeg = -1;
let moves = 0;
const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6'];

function resetGame() {
  const n = parseInt(document.getElementById('disc-qty').value);
  pegs = [[], [], []];
  for (let i = n; i >= 1; i--) pegs[0].push(i);
  moves = 0; selectedPeg = -1;
  document.getElementById('min-needed').textContent = Math.pow(2, n) - 1;
  document.getElementById('level-display').textContent = n - 2;
  render();
}

function render() {
  document.getElementById('moves-count').textContent = moves;
  // Limpar discos antigos
  document.querySelectorAll('.disc').forEach(d => d.remove());
  
  pegs.forEach((peg, pIdx) => {
    const container = document.getElementById(`peg-${pIdx}`);
    container.classList.toggle('active', selectedPeg === pIdx);
    
    peg.forEach((size, dIdx) => {
      const disc = document.createElement('div');
      disc.className = 'disc';
      if (selectedPeg === pIdx && dIdx === peg.length - 1) disc.classList.add('moving');
      
      const w = 40 + (size * 20);
      disc.style.width = w + 'px';
      disc.style.backgroundColor = colors[size - 1];
      disc.style.bottom = (20 + dIdx * 30) + 'px';
      disc.style.left = `calc(50% - ${w/2}px)`;
      disc.textContent = size;
      container.appendChild(disc);
    });
  });
}

function handlePegClick(idx) {
  const n = parseInt(document.getElementById('disc-qty').value);
  const minMoves = Math.pow(2, n) - 1;

  if (selectedPeg === -1) {
    if (pegs[idx].length > 0) {
      selectedPeg = idx;
      sounds.pick();
    } else {
      sounds.error();
    }
  } else {
    if (selectedPeg === idx) {
      selectedPeg = -1;
    } else {
      const disc = pegs[selectedPeg][pegs[selectedPeg].length - 1];
      const targetTop = pegs[idx][pegs[idx].length - 1] || 99;

      if (disc < targetTop) {
        pegs[idx].push(pegs[selectedPeg].pop());
        moves++;
        sounds.drop();
        if (moves > minMoves) sounds.stepWarn();
        if (pegs[2].length === n) { sounds.win(); showWin(); }
      } else {
        sounds.error();
      }
      selectedPeg = -1;
    }
  }
  render();
}

function showWin() {
  document.getElementById('win-stats').textContent = `Fez em ${moves} passos!`;
  document.getElementById('win-modal').style.display = 'flex';
}

function nextLevel() {
  const sel = document.getElementById('disc-qty');
  if (sel.selectedIndex < 2) sel.selectedIndex++;
  document.getElementById('win-modal').style.display = 'none';
  resetGame();
}

resetGame();
</script>
</body>
</html>
